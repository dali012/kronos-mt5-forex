name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps (live runtime + dev)
        run: |
          python -m pip install -U pip
          pip install -r requirements-live.txt ruff pytest
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (fast — skips the slow Kronos model test)
        run: python -m pytest -q -m "not slow"
